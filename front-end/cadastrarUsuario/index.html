<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto API</title>
    
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <!defer: adia a execução do JavaScript até que o HTML
    seja totalmente carregado, melhorando a velocidade de carregamento
    da página.>
    
</head>
<body>
    <div class="container">
        <h1>CADASTRO DE USUARIO</h1>
        <p class="subtitle">Preencha os dados para criar sua conta</p>
        <form action="">
            <input type="text" class="nome" name="nome" placeholder="Nome">
            <input type="email" class="email"name="email" placeholder="Email">
            <input type="password" class="senha" name="senha" placeholder="Senha">
            <input type="text" class="telefone"name="tel" placeholder="Telefone">
            <button>Cadastrar</button>
        </form>
    </div>
</body>
</html>
