<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>

    <link rel="stylesheet" href="./style.css">

    <script src="./script.js" defer></script>
    <!defer: adia a execução do JavaScript até que o HTML seja totalmente carregado, melhorando a velocidade de
        carregamento da página.>

</head>

<body>
    <div class="main-wrapper">
    <div class="cabecalho">
        <h1>Cadastro de Usuário</h1>
        <p class="subtitle">Preencha os dados para criar sua conta</p>
    </div>
    <div class="container">
        <form action="">
            <input type="text" class="nome" name="nome" placeholder="Nome">
            <input type="email" class="email" name="email" placeholder="Email">
            <input type="password" class="senha" name="senha" placeholder="Senha">
            <input type="text" class="telefone" name="tel" placeholder="Telefone">
            <button>Cadastrar</button>
            <a href="../login/index.html">Já está cadastrado? Faça login</a>
        </form>
    </div>
    </div>
    </div>
</body>

</html>
